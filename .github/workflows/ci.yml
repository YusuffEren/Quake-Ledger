name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test-python:
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r src/ingestion/requirements.txt pytest
      - run: make test

  lint-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8"
      - run: terraform fmt -check -recursive terraform/

  validate-terraform:
    runs-on: ubuntu-latest
    needs: lint-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8"
      - run: terraform init -backend=false terraform/
      - run: terraform validate terraform/

  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlfluff
      - run: sqlfluff lint dbt/project/models/ --dialect bigquery

  dbt-build:
    runs-on: ubuntu-latest
    needs: lint-sql
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery
      - run: dbt deps --project-dir dbt/project
      - run: dbt build --project-dir dbt/project --target ci
        env:
          DBT_PROJECT_ID: ${{ secrets.DBT_PROJECT_ID }}
          DBT_KEYFILE: ${{ secrets.DBT_KEYFILE }}

  dbt-test:
    runs-on: ubuntu-latest
    needs: dbt-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery
      - run: dbt deps --project-dir dbt/project
      - run: dbt test --project-dir dbt/project --target ci
        env:
          DBT_PROJECT_ID: ${{ secrets.DBT_PROJECT_ID }}
          DBT_KEYFILE: ${{ secrets.DBT_KEYFILE }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t quake-ingestion src/ingestion/