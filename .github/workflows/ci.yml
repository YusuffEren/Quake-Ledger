name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DBT_PROJECT_ID: ${{ secrets.DBT_PROJECT_ID }}

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test-python:
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r src/ingestion/requirements.txt pytest
      - run: make test

  lint-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.8" }
      - run: terraform fmt -check -recursive terraform/

  validate-terraform:
    runs-on: ubuntu-latest
    needs: lint-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.8" }
      - run: terraform init -backend=false terraform/
      - run: terraform validate terraform/

  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install sqlfluff
      - run: sqlfluff lint dbt/project/models/ --dialect bigquery

  setup-gcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      # GCP auth hazır — downstream job'lar google-github-actions/auth'ın
      # environment file'ından GOOGLE_APPLICATION_CREDENTIALS alır.

  dbt-build:
    runs-on: ubuntu-latest
    needs: [lint-sql, setup-gcp]
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install dbt-bigquery
      - run: dbt deps --project-dir dbt/project
      - run: dbt build --project-dir dbt/project --target ci
        env:
          DBT_KEYFILE: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}

  dbt-test:
    runs-on: ubuntu-latest
    needs: dbt-build
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install dbt-bigquery
      - run: dbt deps --project-dir dbt/project
      - run: dbt test --project-dir dbt/project --target ci
        env:
          DBT_KEYFILE: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}

  cost-regression-test:
    runs-on: ubuntu-latest
    needs: dbt-build
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install google-cloud-bigquery
      # Baseline dosyası repoda commit'li — CI sadece karşılaştırma yapar
      - name: Determine base ref for diff
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "BASE_REF=origin/${{ github.base_ref }}" >> $GITHUB_ENV
          else
            echo "BASE_REF=HEAD~1" >> $GITHUB_ENV
          fi
      - run: python scripts/cost_regression_test.py \
          --project ${{ env.DBT_PROJECT_ID }} \
          --dataset staging \
          --baseline-file cost_baseline.json \
          --threshold-percent 20 \
          --dry-run-only \
          --base-ref ${{ env.BASE_REF }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t quake-ingestion src/ingestion/
