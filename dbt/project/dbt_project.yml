name: quake_ledger
profile: quake_ledger
version: "1.0.0"
config-version: 2

require-dbt-version: [">=1.8.0", "<2.0.0"]

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
docs-paths: ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  quake_ledger:
    staging:
      +materialized: view
      +tags: ["staging"]
    reconciliation:
      +materialized: table
      +tags: ["reconciliation"]
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]

tests:
  +store_failures: true
  +severity: error
