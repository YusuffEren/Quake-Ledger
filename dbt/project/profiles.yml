quake_ledger:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      keyfile: "{{ env_var('DBT_KEYFILE', '../../gcp-key.json') }}"
      project: "{{ env_var('DBT_PROJECT_ID', 'deprem-502519') }}"
      dataset: staging  # dbt models in staging dataset
      location: EU
      priority: interactive
      threads: 4
      job_execution_timeout_seconds: 300
      job_retry_deadline_seconds: 60
    ci:
      type: bigquery
      method: service-account
      keyfile: "{{ env_var('DBT_KEYFILE') }}"
      project: "{{ env_var('DBT_PROJECT_ID') }}"
      dataset: dbt_ci
      location: EU
      priority: interactive
      threads: 2
      job_execution_timeout_seconds: 120
      job_retry_deadline_seconds: 30
